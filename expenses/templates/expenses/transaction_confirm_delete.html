{% extends "base.html" %}

{% block title %}Delete transaction — Finance Tracker{% endblock %}

{% block content %}
<div class="mx-auto max-w-md px-2">
  <div class="rounded-2xl border border-slate-200/80 bg-white p-8 text-center shadow-sm ring-1 ring-slate-900/5">
    <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-100 text-red-600">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <h1 class="mt-4 text-lg font-semibold text-slate-900">Delete transaction?</h1>
    <p class="mt-2 text-sm text-slate-600">
      This will permanently remove <span class="font-medium text-slate-900">“{{ object.title }}”</span>
      ({{ object.amount|floatformat:2 }}).
    </p>
    <form method="post" class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
      {% csrf_token %}
      <button type="submit"
              class="inline-flex w-full justify-center rounded-xl bg-red-600 px-5 py-2.5 text-sm font-semibold text-white shadow hover:bg-red-500 sm:w-auto">
        Yes, delete
      </button>
      <a href="{% url 'expenses:transaction_list' %}"
         class="inline-flex w-full justify-center rounded-xl border border-slate-300 bg-white px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 sm:w-auto">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
